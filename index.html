<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The College ROI Inquiry</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&family=Public+Sans:ital,wght@0,300..800;1,300..800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
:root{
  --control-h:52px;
  --paper:#F5F1E8;
  --paper-2:#ECE6D6;
  --paper-3:#E2DBC7;
  --ink:#1A1814;
  --ink-2:#5A544A;
  --ink-3:#8A8478;
  --rule:#C8C0AC;
  --rule-2:#D8D2C0;
  --accent:#1F5E55;
  --accent-2:#3F7E75;
  --accent-3:#5F9E95;
  --warn:#B83A2C;
  --pos:#1F8A5B;
  --neg:#B83A2C;
  --hs:#9C7A4B;
  --alt:#5A6F8C;
  --serif:'Newsreader',Georgia,serif;
  --sans:'Public Sans',ui-sans-serif,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --maxw:1080px;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{background:
  radial-gradient(circle at 0% 0%, rgba(31,94,85,.04), transparent 40%),
  radial-gradient(circle at 100% 0%, rgba(140,45,42,.025), transparent 35%),
  var(--paper);
  min-height:100vh;
}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
.pos{color:var(--pos)}
.neg{color:var(--neg)}
.warn{color:var(--warn)}
em{font-family:var(--serif);font-style:italic;color:var(--ink-2)}
i{font-style:italic}

/* ─── Page chrome ────────────────────────────────────────────────── */
.page{max-width:var(--maxw);margin:0 auto;padding:32px 40px 80px;position:relative}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;
  border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:18px}
.brand{display:flex;align-items:flex-end;gap:14px}
.brand-mark{font-family:var(--serif);font-size:46px;font-weight:600;line-height:0.9;
  color:var(--accent);letter-spacing:-.02em}
.brand-text{display:flex;flex-direction:column;gap:3px;min-width:0}
.brand-line{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:-.01em;line-height:1.05;white-space:nowrap}
.brand-sub{font-size:11px;color:var(--ink-2);font-style:italic;font-family:var(--serif);line-height:1.2}
.header-meta{font-family:var(--mono);font-size:10px;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase;display:flex;gap:10px;align-items:center}
.hsep{width:1px;height:11px;background:var(--rule)}

/* ─── Lede ───────────────────────────────────────────────────────────── */
.lede{margin:36px 0 28px;display:grid;grid-template-columns:1.1fr 1fr;gap:48px;align-items:end}
.lede-h1{font-family:var(--serif);font-weight:500;font-size:84px;line-height:0.92;
  letter-spacing:-.035em;margin:0;color:var(--ink);font-optical-sizing:auto}
.lede-h1 br{display:block}
.lede-dek{font-family:var(--serif);font-size:18px;line-height:1.5;color:var(--ink-2);
  margin:0;text-wrap:pretty;max-width:46ch}

.rule{height:1px;background:var(--rule);margin:28px 0}
.rule.double{height:1px;background:var(--ink);margin:28px 0;position:relative}
.rule.double::after{content:"";position:absolute;left:0;right:0;top:3px;height:1px;background:var(--ink)}

/* ─── Inputs ────────────────────────────────────────────────────────── */
.rs-kicker{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-2);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.rs-kicker::before{content:"";width:24px;height:1px;background:var(--ink)}
.ipt-section{padding:8px 0 24px}
.inputs{display:flex;flex-direction:column;gap:18px}
.ipt-row{display:grid;grid-template-columns:1.4fr 1fr;gap:24px}
.ipt-grp{display:flex;flex-direction:column;gap:6px}
.ipt-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);font-weight:500}
.ipt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px 24px}
.field{display:flex;flex-direction:column;gap:6px;min-width:0}
.cb{position:relative;width:100%;min-width:0}

/* ─── Mode tabs ─────────────────────────────────────────────────────── */
.mode-tabs{display:flex;margin-bottom:20px;border-bottom:1px solid var(--rule)}
.mode-tab{
  position:relative;display:inline-flex;align-items:center;gap:6px;
  background:transparent;border:0;border-bottom:2px solid transparent;margin-bottom:-1px;
  padding:9px 18px 10px;
  font:600 10px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-3);cursor:pointer;white-space:nowrap;
  transition:color .15s,border-color .15s
}
.mode-tab:hover{color:var(--ink-2)}
.mode-tab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* ─── Pathway summary sub-label ─────────────────────────────────────── */
.pwy-savings-sub{font-size:.75rem;color:var(--ink-3);margin-left:0;align-self:auto}
.pwy-hero-row .hero-stat{border:0}
.pwy-school-hdr{display:flex;align-items:baseline;justify-content:space-between;gap:8px;min-height:14px}
.pwy-phase .ipt-row{align-items:end}
.pwy-filter-note{font-family:var(--mono);font-size:9px;letter-spacing:.04em;color:var(--ink-3);
  font-weight:400;text-transform:none;white-space:nowrap}
.pwy-filter-toggle{background:transparent;border:0;padding:0;font:inherit;color:var(--accent);
  cursor:pointer;text-decoration:underline;text-underline-offset:2px}

/* ─── Combobox ──────────────────────────────────────────────────────── */
.cb-trigger{
  width:100%;display:flex;align-items:center;gap:10px;
  background:var(--paper-2);border:1px solid var(--rule);
  padding:14px 16px;font:500 17px/1.2 var(--serif);color:var(--ink);
  cursor:pointer;text-align:left;min-height:var(--control-h);min-width:0;
  border-radius:0;transition:border-color .15s, background .15s;
}
.cb-trigger:hover{border-color:var(--ink-2);background:var(--paper-3)}
.cb-trigger.open{border-color:var(--ink);background:var(--paper-3)}
.cb-icon{color:var(--accent);font-size:14px}
.cb-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cb-text em{color:var(--ink-3);font-style:italic;font-family:var(--serif)}
.cb-caret{font-size:10px;color:var(--ink-2)}
.cb-pop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--paper);
  border:1px solid var(--ink);box-shadow:0 16px 36px rgba(26,24,20,.18);z-index:200;
  max-height:380px;display:flex;flex-direction:column}
.cb-search{padding:10px;border-bottom:1px solid var(--rule)}
.cb-search input{
  width:100%;border:0;background:transparent;outline:0;
  font:500 15px/1 var(--sans);color:var(--ink);padding:6px 4px;
  border-bottom:1px solid var(--ink-2);
}
.cb-list{overflow-y:auto;flex:1;padding:4px 0}
.cb-group{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink-3);padding:8px 14px 4px}
.cb-item{display:flex;justify-content:space-between;align-items:center;gap:12px;
  width:100%;padding:9px 14px;background:transparent;border:0;cursor:pointer;
  text-align:left;font:14px/1.2 var(--sans);color:var(--ink)}
.cb-item:hover{background:var(--paper-2)}
.cb-item.sel{background:var(--paper-3)}
.cb-item-name{flex:1}
.cb-item-meta{font-family:var(--mono);font-size:10px;color:var(--ink-3);display:flex;align-items:center;gap:6px}
.cb-custom{border-top:1px dashed var(--rule);margin-top:4px}
.badge-ai{font-family:var(--mono);font-size:9px;letter-spacing:.06em;
  background:var(--paper-3);color:var(--ink-2);padding:2px 6px;border:1px solid var(--rule)}
.badge-yrs{font-family:var(--mono);font-size:9px;letter-spacing:.04em;
  background:transparent;color:var(--ink-3);padding:2px 5px;border:1px solid var(--rule);margin-left:4px}
.cb-type-filters{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px 6px;border-bottom:1px solid var(--rule)}
.cb-type-btn{font-family:var(--sans);font-size:10px;letter-spacing:.04em;text-transform:uppercase;
  padding:3px 8px;border:1px solid var(--rule);background:transparent;color:var(--ink-2);cursor:pointer}
.cb-type-btn:hover{background:var(--paper-2)}
.cb-type-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.cb-empty{padding:14px;color:var(--ink-3);font-style:italic}

/* ─── Segment / number inputs ─────────────────────────────────────── */
.seg{display:flex;border:1px solid var(--rule);background:var(--paper-2);min-height:var(--control-h)}
.seg-opt{flex:1;display:flex;align-items:center;justify-content:center;
  padding:6px;background:transparent;border:0;
  font:500 12px/1 var(--sans);color:var(--ink-2);cursor:pointer;
  border-right:1px solid var(--rule);transition:background .12s, color .12s}
.seg-opt:last-child{border-right:0}
.seg-opt:hover{background:var(--paper-3);color:var(--ink)}
.seg-opt.on{background:var(--ink);color:var(--paper)}
.numinp{display:flex;align-items:center;border:1px solid var(--rule);background:var(--paper-2);
  padding:0 10px;min-height:var(--control-h);min-width:0}
.numinp-pre,.numinp-suf{font-family:var(--mono);font-size:12px;color:var(--ink-2)}
.income-sel{display:block;width:100%;min-height:var(--control-h);padding:0 10px;
  background:var(--paper-2);border:1px solid var(--rule);border-radius:0;
  color:var(--ink);font:600 11px/1 var(--mono);letter-spacing:.05em;cursor:pointer;
  appearance:none;-webkit-appearance:none}
.income-sel:focus{outline:2px solid var(--accent);outline-offset:1px}
.numinp input{flex:1;border:0;outline:0;background:transparent;padding:0 6px;
  min-height:calc(var(--control-h) - 2px);
  font:500 14px/1 var(--mono);color:var(--ink);font-variant-numeric:tabular-nums}

.ipt-footer{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-top:6px}
.compare-btn{background:transparent;border:1px solid var(--ink);
  padding:9px 14px;font:500 12px/1 var(--mono);letter-spacing:.06em;
  color:var(--ink);cursor:pointer;text-transform:uppercase}
.compare-btn:hover{background:var(--ink);color:var(--paper)}
.compare-btn.on{background:var(--ink);color:var(--paper)}
.ai-busy{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--ink-2)}
.spinner{width:11px;height:11px;border:1.5px solid var(--rule);border-top-color:var(--ink);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-disclaimer{flex-basis:100%;background:var(--paper-2);border-left:3px solid var(--warn);
  padding:10px 14px;font-size:13px;color:var(--ink-2);line-height:1.5}
.ai-disclaimer b{color:var(--warn);font-weight:600}

/* ─── Verdict ────────────────────────────────────────────────────────── */
.results{display:flex;flex-direction:column;gap:42px}
.verdict{display:grid;grid-template-columns:1fr 1.4fr;gap:36px;align-items:center;
  padding:28px 32px;background:var(--paper-2);border:1px solid var(--rule);position:relative;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 7px,rgba(26,24,20,.025) 7px,rgba(26,24,20,.025) 8px);
}
.verdict.v-strong{border-color:var(--pos);box-shadow:inset 4px 0 0 var(--pos)}
.verdict.v-moderate{border-color:var(--accent);box-shadow:inset 4px 0 0 var(--accent)}
.verdict.v-marginal{border-color:#B58A2A;box-shadow:inset 4px 0 0 #B58A2A}
.verdict.v-negative{border-color:var(--neg);box-shadow:inset 4px 0 0 var(--neg)}
.verdict-mark{display:flex;flex-direction:column;gap:10px}
.verdict-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.16em;font-weight:600}
.verdict-kicker.pos{color:var(--pos)}
.verdict-kicker.warn{color:#A57A1A}
.verdict-kicker.neg{color:var(--neg)}
.verdict-line{font-family:var(--serif);font-size:32px;font-weight:500;line-height:1.05;
  letter-spacing:-.02em;color:var(--ink);text-wrap:balance}
.verdict-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;border-left:1px solid var(--rule);padding-left:32px}
.vg-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px}
.vg-num{font-size:26px;font-weight:500;letter-spacing:-.02em;color:var(--ink)}

/* ─── Hero stats ─────────────────────────────────────────────────────── */
.hero-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;
  border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.hero-stat{padding:18px 22px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule)}
.hero-stat:nth-child(3n){border-right:0}
.hero-stat:nth-last-child(-n+3){border-bottom:0}
.hero-label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);
  display:flex;align-items:center;gap:6px;margin-bottom:8px}
.hero-num{font-size:32px;font-weight:500;letter-spacing:-.025em;color:var(--ink);line-height:1.05}
.hero-num.mono{font-family:var(--mono)}
.hero-sub{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--ink-2);margin-top:4px}

/* ─── Section ────────────────────────────────────────────────────────── */
.rs-sec{display:grid;grid-template-columns:240px 1fr;gap:48px;align-items:start}
.rs-head{position:sticky;top:24px}
.rs-title{font-family:var(--serif);font-size:30px;font-weight:500;line-height:1.1;
  letter-spacing:-.02em;margin:6px 0 10px;color:var(--ink);text-wrap:balance}
.rs-dek{font-family:var(--serif);font-size:14px;line-height:1.55;color:var(--ink-2);margin:0;text-wrap:pretty}
.rs-body{display:flex;flex-direction:column;gap:18px;min-width:0}

/* ─── Charts ────────────────────────────────────────────────────────── */
.chart-wrap{position:relative}
.chart-svg{width:100%;height:auto;display:block;font-family:var(--sans)}
.ax-label{font-family:var(--mono);font-size:10px;fill:var(--ink-2)}
.ax-title{font-family:var(--sans);font-size:11px;fill:var(--ink-2);font-style:italic}
.end-label{font-family:var(--sans);font-size:10.5px;fill:var(--ink-2);dominant-baseline:middle}
.end-label.bold{font-weight:600;font-size:11px;fill:var(--ink)}
.annot{font-family:var(--serif);font-size:10px;font-style:italic;fill:var(--ink-3)}
.annot.accent{fill:var(--accent);font-weight:500}
.chart-tip{position:absolute;top:8px;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);padding:8px 10px;font:11px/1.4 var(--sans);
  pointer-events:none;min-width:160px;box-shadow:0 4px 14px rgba(0,0,0,.2);z-index:10}
.tip-h{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(245,241,232,.65);margin-bottom:5px}
.tip-row{display:flex;align-items:center;gap:6px;justify-content:space-between}
.tip-row b{font-family:var(--mono);font-weight:500;font-variant-numeric:tabular-nums}
.tip-row .dot{width:8px;height:8px;display:inline-block;flex-shrink:0;margin-right:2px}
.tip-row span:not(.dot){flex:1}

.legend{display:flex;flex-wrap:wrap;gap:18px;font-family:var(--mono);font-size:11px;color:var(--ink-2);margin-top:6px}
.legend-item{display:flex;align-items:center;gap:7px}
.legend-swatch{width:14px;height:8px;display:inline-block;border:1px solid transparent}
.legend-swatch.dashed{border:1px dashed currentColor;background:transparent}

.sk-label{font-family:var(--sans)}
.sk-name{font-size:11px;fill:var(--ink);font-weight:500}
.sk-val{font-size:10px;fill:var(--ink-2);font-family:var(--mono)}

.cmp-label{font-family:var(--sans);font-size:13px;fill:var(--ink-2)}
.cmp-label.bold{fill:var(--ink);font-weight:600}
.cmp-val{font-family:var(--mono);font-size:13px;fill:var(--ink-2);dominant-baseline:middle}
.cmp-val.bold{fill:var(--ink);font-weight:600;font-size:14px}

.cost-row{margin-bottom:8px}
.stack-h{font-family:var(--mono);font-size:11px;fill:var(--ink-2);text-transform:uppercase;letter-spacing:.06em}
.stack-h.bold{fill:var(--ink);font-weight:600;font-size:13px}
.stack-lbl{font-family:var(--sans);font-size:10.5px;fill:var(--ink-2)}
.stack-num{font-family:var(--mono);font-size:11px;fill:var(--ink);font-weight:500}

.footnote{font-family:var(--serif);font-size:12px;font-style:italic;color:var(--ink-2);margin:6px 0 0;line-height:1.5}

/* ─── Info tooltip ───────────────────────────────────────────────────── */
.info-wrap{position:relative;display:inline-flex;align-items:center}
.info-btn{background:transparent;border:0;padding:0 2px;color:var(--ink-3);cursor:pointer;display:inline-flex;align-items:center}
.info-btn:hover{color:var(--ink)}
.info-pop{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);padding:9px 12px;
  font:11px/1.5 var(--sans);width:280px;display:flex;flex-direction:column;gap:4px;
  z-index:50;text-transform:none;letter-spacing:0}
.info-pop b{color:var(--paper);font-weight:600;font-size:11px}
.info-detail{color:rgba(245,241,232,.85)}
.info-src{font-family:var(--mono);font-size:9.5px;color:rgba(245,241,232,.6);letter-spacing:.04em;border-top:1px solid rgba(245,241,232,.15);padding-top:5px;margin-top:2px}
.info-src em{font-style:normal;color:rgba(245,241,232,.42);margin-right:4px;text-transform:uppercase;font-size:8.5px;letter-spacing:.08em}
.info-meta{display:flex;flex-direction:column;gap:2px;font-family:var(--mono);font-size:9.5px;color:rgba(245,241,232,.6);letter-spacing:.04em}
.info-meta em{font-style:normal;color:rgba(245,241,232,.42);margin-right:4px;text-transform:uppercase;font-size:8.5px;letter-spacing:.08em}

/* ─── Freshness badge ────────────────────────────────────────────────── */
.freshness{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--paper-2);border:1px solid var(--rule);margin:18px 0 0;
  font-family:var(--mono);font-size:11px;color:var(--ink-2);flex-wrap:wrap}
.freshness-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-3);flex-shrink:0}
.freshness-dot.ok{background:var(--pos)}
.freshness-dot.stale{background:var(--warn)}
.freshness-dot.checking{background:var(--hs);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.freshness-vintage{flex:1;min-width:200px}
.freshness-vintage b{color:var(--ink);font-weight:600}
.freshness-actions{display:flex;gap:8px;align-items:center}
.fr-btn{background:transparent;border:1px solid var(--ink-2);
  padding:6px 10px;font:500 10px/1 var(--mono);letter-spacing:.06em;
  color:var(--ink);cursor:pointer;text-transform:uppercase}
.fr-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.fr-btn:disabled{opacity:.4;cursor:not-allowed}
.fr-key-input{font:11px/1 var(--mono);padding:6px 10px;border:1px solid var(--rule);
  background:var(--paper);color:var(--ink);width:240px}
.fr-key-input:focus{outline:none;border-color:var(--ink)}
.fr-msg{font-family:var(--mono);font-size:10.5px;color:var(--ink-2);line-height:1.5}
.fr-msg.err{color:var(--warn)}
.fr-msg.ok{color:var(--pos)}
.fr-meta{opacity:.7}

/* ─── Compare table ──────────────────────────────────────────────────── */
.compare-section{display:flex;flex-direction:column;gap:18px}
.compare-inputs-wrap{padding:16px;background:var(--paper-2);border:1px solid var(--rule)}
/* ── 2+2 pathway ── */
.pwy-inputs{background:var(--paper-2);border:1px solid var(--rule);padding:20px}
.pwy-phases{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:start}
.pwy-phase{display:flex;flex-direction:column;gap:12px}
.pwy-phase-label{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink-2);border-bottom:2px solid var(--accent);padding-bottom:6px}
.pwy-phase-years{font-weight:400;color:var(--ink-3);margin-left:6px}
.pwy-connector{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding-top:32px;color:var(--ink-3)}
.pwy-arrow-line{width:1px;height:28px;background:var(--rule)}
.pwy-arrow-label{font-family:var(--sans);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  writing-mode:vertical-rl;color:var(--ink-3)}
.pwy-results{margin-top:20px;display:flex;flex-direction:column;gap:20px}
.pwy-savings-banner{display:flex;align-items:baseline;gap:14px;padding:16px 20px;
  background:color-mix(in srgb,var(--accent) 8%,transparent);border:1px solid var(--accent)}
.pwy-savings-banner.over{background:color-mix(in srgb,#8C2D2A 8%,transparent);border-color:#8C2D2A}
.pwy-savings-num{font-size:2rem;font-weight:700;color:var(--accent)}
.pwy-savings-banner.over .pwy-savings-num{color:#8C2D2A}
.pwy-savings-lbl{font-family:var(--sans);font-size:.85rem;color:var(--ink-2)}
.pwy-cost-table{display:grid;grid-template-columns:minmax(160px,1.6fr) repeat(4,minmax(90px,1fr));
  border-top:2px solid var(--ink);border-bottom:1px solid var(--rule);overflow-x:auto}
.pwy-cost-head{display:contents}
.pwy-col-hd{font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;padding:8px 6px;text-align:right;border-bottom:1px solid var(--ink)}
.pwy-col-sub{font-weight:400;color:var(--ink-3)}
.pwy-col-lbl,.pwy-col-val{padding:7px 6px;border-bottom:1px solid var(--rule)}
.pwy-col-lbl{font-family:var(--sans);font-size:.78rem;color:var(--ink-2)}
.pwy-col-val{font-size:.82rem;text-align:right}
.pwy-cost-row{display:contents}
.pwy-cost-row.bold .pwy-col-lbl,.pwy-cost-row.bold .pwy-col-val{font-weight:700;
  border-top:1px solid var(--rule);background:var(--paper-2)}
.pwy-direct-col{color:var(--ink-3)}
.pwy-hero-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;
  border:1px solid var(--rule);background:var(--rule)}
.pwy-hero-row .hero-stat{background:var(--paper);padding:14px 16px}
.cmp-table{display:grid;grid-template-columns:1.4fr 1fr 1fr;border-top:1px solid var(--ink)}
.cmp-table-head{display:contents}
.cmp-table-head>*{padding:14px 16px;border-bottom:1px solid var(--ink);background:var(--paper-2)}
.cmp-th{display:flex;flex-direction:column;gap:2px}
.cmp-th-school{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink)}
.cmp-th-prog{font-family:var(--mono);font-size:10px;color:var(--ink-2);letter-spacing:.05em;text-transform:uppercase}
.cmp-table-row{display:contents}
.cmp-table-row>*{padding:13px 16px;border-bottom:1px solid var(--rule)}
.cmp-row-lbl{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2)}
.cmp-row-val{font-size:18px;color:var(--ink-2);font-weight:500}
.cmp-row-val.win{color:var(--accent);font-weight:600;position:relative}
.cmp-row-val.win::before{content:"▸ ";color:var(--accent)}

/* ─── Tweaks panel ───────────────────────────────────────────────────── */
.tweaks-panel{
  position:fixed;right:0;top:50%;transform:translateY(-50%);
  background:var(--paper-2);border:1px solid var(--rule);border-right:0;
  display:flex;flex-direction:column;z-index:100;
  box-shadow:-4px 0 20px rgba(26,24,20,.08);
}
.tweaks-panel.collapsed{width:auto}
.tweaks-toggle{display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:transparent;border:0;border-bottom:1px solid var(--rule);
  font:500 10px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-2);cursor:pointer;width:100%;text-align:left}
.tweaks-toggle:hover{background:var(--paper-3);color:var(--ink)}
.tweaks-toggle-icon{font-size:13px;line-height:1}
.tweaks-body{padding:14px;display:flex;flex-direction:column;gap:14px;width:220px;overflow-y:auto;max-height:70vh}
.tweak-section{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-3);padding-top:4px;border-top:1px solid var(--rule-2)}
.tweak-section:first-child{border-top:0;padding-top:0}
.tweak-row{display:flex;flex-direction:column;gap:6px}
.tweak-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2)}
.tweak-colors{display:flex;gap:6px;flex-wrap:wrap}
.tweak-swatch{width:22px;height:22px;border:2px solid transparent;cursor:pointer;padding:0;
  transition:border-color .12s, transform .12s}
.tweak-swatch:hover{transform:scale(1.15)}
.tweak-swatch.on{border-color:var(--ink)}
.tweak-seg{display:flex;border:1px solid var(--rule)}
.tweak-seg-opt{flex:1;padding:6px 4px;background:transparent;border:0;border-right:1px solid var(--rule);
  font:500 10px/1 var(--mono);color:var(--ink-2);cursor:pointer;text-align:center;
  transition:background .12s, color .12s}
.tweak-seg-opt:last-child{border-right:0}
.tweak-seg-opt:hover{background:var(--paper-3);color:var(--ink)}
.tweak-seg-opt.on{background:var(--ink);color:var(--paper)}
.tweak-row-slider{gap:8px}
.tweak-slider-wrap{display:flex;align-items:center;gap:8px}
.tweak-slider{flex:1;accent-color:var(--accent);cursor:pointer;height:3px}
.tweak-slider-val{font-family:var(--mono);font-size:11px;color:var(--ink);min-width:36px;text-align:right}

/* ─── Footer ─────────────────────────────────────────────────────────── */
.page-footer{margin-top:60px;padding-top:24px;border-top:2px solid var(--ink)}
.footer-cols{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-bottom:24px}
.footer-cols h4{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);margin:0 0 10px;font-weight:600}
.footer-cols ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px}
.footer-cols li{font-family:var(--serif);font-size:13px;line-height:1.55;color:var(--ink-2)}
.footer-cols i{color:var(--ink)}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;
  padding-top:14px;border-top:1px solid var(--rule);
  font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3)}

/* ─── Responsive ─────────────────────────────────────────────────────── */
@media (max-width:900px){
  .page{padding:20px 18px 60px}
  .lede{grid-template-columns:1fr;gap:18px}
  .lede-h1{font-size:56px}
  .verdict{grid-template-columns:1fr;gap:18px;padding:20px}
  .verdict-grid{grid-template-columns:1fr 1fr 1fr;border-left:0;padding-left:0;border-top:1px solid var(--rule);padding-top:18px}
  .hero-row{grid-template-columns:repeat(2,1fr)}
  .hero-stat{border-right:1px solid var(--rule)}
  .hero-stat:nth-child(3n){border-right:1px solid var(--rule)}
  .hero-stat:nth-child(2n){border-right:0}
  .rs-sec{grid-template-columns:1fr;gap:18px}
  .rs-head{position:static}
  .ipt-grid{grid-template-columns:repeat(2,1fr)}
  .ipt-row{grid-template-columns:1fr}
  .footer-cols{grid-template-columns:1fr}
  .lede-dek{font-size:16px}
  .tweaks-panel{position:static;transform:none;border:1px solid var(--rule);margin:24px 0;box-shadow:none}
  .tweaks-body{width:100%;max-height:none}
  .pwy-phases{grid-template-columns:1fr}
  .pwy-connector{flex-direction:row;padding-top:0}
  .pwy-arrow-label{writing-mode:horizontal-tb}
  .pwy-arrow-line{width:28px;height:1px}
}
</style>
</head>
